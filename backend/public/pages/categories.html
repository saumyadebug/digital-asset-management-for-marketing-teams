<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Category Management · CloudVault DAM</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@500;600;700;800&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
<link rel="stylesheet" href="../css/style.css">
</head>
<body>

<div id="pageLoader" class="position-fixed top-0 start-0 w-100 h-100 d-flex align-items-center justify-content-center" style="background:var(--bg); z-index:2000;">
  <div class="brand-spinner"></div>
</div>

<div class="app-shell">
  <div id="sidebar-mount"></div>

  <div class="main-content">
    <div id="topnav-mount"></div>

    <div class="page-body">
      <nav class="breadcrumb-surface" aria-label="breadcrumb">
        <a href="dashboard.html">Home</a> <i class="bi bi-chevron-right mx-1" style="font-size:.65rem;"></i> <span class="text-primary fw-semibold">Categories</span>
      </nav>

      <div class="d-flex flex-wrap align-items-center justify-content-between mb-4 gap-3">
        <div>
          <h2 class="fw-bold mb-1">Category Management</h2>
          <p class="text-muted-2 mb-0">Organize your asset library into structured collections.</p>
        </div>
        <button class="btn btn-primary d-flex align-items-center gap-2" data-bs-toggle="modal" data-bs-target="#categoryModal" id="addCategoryBtn">
          <i class="bi bi-plus-lg"></i>Add Category
        </button>
      </div>

      <div class="card-surface p-4">
        <div class="d-flex flex-wrap align-items-center justify-content-between gap-2 mb-3">
          <div class="position-relative" style="max-width:320px;">
            <i class="bi bi-search position-absolute" style="left:12px; top:11px; color:var(--text-muted); font-size:.85rem;"></i>
            <input type="search" class="form-control ps-5" id="categorySearch" placeholder="Search categories...">
          </div>
          <span class="text-muted-2 small" id="categoryCount"></span>
        </div>

        <div class="table-surface">
          <div class="table-responsive">
            <table class="table align-middle">
              <thead><tr><th>Category Name</th><th>Description</th><th>Total Assets</th><th>Actions</th></tr></thead>
              <tbody id="categoryTableBody"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Add / Edit Category Modal -->
<div class="modal fade" id="categoryModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content" style="border-radius:var(--radius-lg); border:none;">
      <div class="modal-header border-0">
        <h5 class="modal-title fw-bold" id="categoryModalTitle">Add Category</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <form id="categoryForm">
          <input type="hidden" id="categoryId">
          <div class="mb-3">
            <label for="categoryName" class="form-label">Category name</label>
            <input type="text" class="form-control" id="categoryName" placeholder="e.g. Email Campaigns" required>
          </div>
          <div class="mb-1">
            <label for="categoryDescription" class="form-label">Description</label>
            <textarea class="form-control" id="categoryDescription" rows="3" placeholder="What kind of assets belong here?" required></textarea>
          </div>
        </form>
      </div>
      <div class="modal-footer border-0">
        <button class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
        <button class="btn btn-primary" id="saveCategoryBtn">Save Category</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/data.js"></script>
<script src="../js/layout.js"></script>
<script src="../js/main.js"></script>
<script src="../js/categories.js"></script>
</body>
</html>
