<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Access Denied · CloudVault DAM</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@500;600;700;800&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
<link rel="stylesheet" href="../css/style.css">
</head>
<body>
<div class="error-page">
  <div>
    <svg width="220" height="160" viewBox="0 0 220 160" fill="none" class="mb-4">
      <circle cx="110" cy="80" r="70" fill="var(--warning)" fill-opacity=".1"/>
      <path d="M110 44l38 18v24c0 26-16 40-38 50-22-10-38-24-38-50V62l38-18z" fill="var(--warning)" fill-opacity=".2" stroke="var(--warning)" stroke-width="3"/>
      <path d="M98 82l9 9 16-18" stroke="var(--warning)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" opacity=".7"/>
    </svg>
    <div class="error-code" style="background:linear-gradient(135deg, var(--warning), #F97316); -webkit-background-clip:text; background-clip:text;">403</div>
    <h4 class="fw-bold mt-2 mb-2">Access Denied</h4>
    <p class="text-muted-2 mb-4" style="max-width:420px; margin:0 auto;">
      You don't have permission to view this resource. If you believe this is a mistake, contact your workspace administrator.
    </p>
    <div class="d-flex gap-2 justify-content-center flex-wrap">
      <a href="dashboard.html" class="btn btn-primary"><i class="bi bi-house-door me-1"></i>Return Home</a>
      <a href="login.html" class="btn btn-outline-secondary"><i class="bi bi-box-arrow-in-right me-1"></i>Switch Account</a>
    </div>
  </div>
</div>
</body>
</html>
