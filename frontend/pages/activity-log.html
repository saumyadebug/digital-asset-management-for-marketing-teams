<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Activity Log · CloudVault DAM</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@500;600;700;800&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
<link rel="stylesheet" href="../css/style.css">
</head>
<body>

<div id="pageLoader" class="position-fixed top-0 start-0 w-100 h-100 d-flex align-items-center justify-content-center" style="background:var(--bg); z-index:2000;">
  <div class="brand-spinner"></div>
</div>

<div class="app-shell">
  <div id="sidebar-mount"></div>

  <div class="main-content">
    <div id="topnav-mount"></div>

    <div class="page-body">
      <nav class="breadcrumb-surface" aria-label="breadcrumb">
        <a href="dashboard.html">Home</a> <i class="bi bi-chevron-right mx-1" style="font-size:.65rem;"></i> <span class="text-primary fw-semibold">Activity Logs</span>
      </nav>

      <div class="mb-4">
        <h2 class="fw-bold mb-1">Activity Log</h2>
        <p class="text-muted-2 mb-0">A complete history of actions across your workspace.</p>
      </div>

      <div class="card-surface p-4 mb-4">
        <div class="row g-2">
          <div class="col-md-5">
            <div class="position-relative">
              <i class="bi bi-search position-absolute" style="left:12px; top:11px; color:var(--text-muted); font-size:.85rem;"></i>
              <input type="search" class="form-control ps-5" id="activitySearch" placeholder="Search by user or asset...">
            </div>
          </div>
          <div class="col-md-4">
            <select class="form-select" id="activityUserFilter">
              <option value="">All Users</option>
            </select>
          </div>
          <div class="col-md-3">
            <select class="form-select" id="activityActionFilter">
              <option value="">All Actions</option>
              <option value="uploaded">Uploaded</option>
              <option value="downloaded">Downloaded</option>
              <option value="shared">Shared</option>
              <option value="edited">Edited</option>
              <option value="deleted">Deleted</option>
              <option value="created">Created</option>
              <option value="invited">Invited</option>
            </select>
          </div>
        </div>
      </div>

      <div class="card-surface p-4">
        <div class="timeline" id="activityTimeline"></div>
        <div id="activityEmptyState" class="text-center py-5 d-none">
          <i class="bi bi-search display-4 text-muted-2"></i>
          <h6 class="fw-bold mt-3">No matching activity</h6>
          <p class="text-muted-2">Try a different search term or filter.</p>
        </div>
      </div>

    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/data.js"></script>
<script src="../js/layout.js"></script>
<script src="../js/main.js"></script>
<script src="../js/activity-log.js"></script>
</body>
</html>
