<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Asset Details · CloudVault DAM</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@500;600;700;800&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
<link rel="stylesheet" href="../css/style.css">
</head>
<body>

<div id="pageLoader" class="position-fixed top-0 start-0 w-100 h-100 d-flex align-items-center justify-content-center" style="background:var(--bg); z-index:2000;">
  <div class="brand-spinner"></div>
</div>

<div class="app-shell">
  <div id="sidebar-mount"></div>

  <div class="main-content">
    <div id="topnav-mount"></div>

    <div class="page-body">
      <nav class="breadcrumb-surface" aria-label="breadcrumb">
        <a href="dashboard.html">Home</a> <i class="bi bi-chevron-right mx-1" style="font-size:.65rem;"></i>
        <a href="gallery.html">Assets</a> <i class="bi bi-chevron-right mx-1" style="font-size:.65rem;"></i>
        <span class="text-primary fw-semibold" id="breadcrumbAssetName">Asset Details</span>
      </nav>

      <div class="row g-4">
        <div class="col-lg-8">
          <div class="card-surface p-4 mb-4">
            <div id="assetPreviewLarge" class="d-flex align-items-center justify-content-center rounded-4 mb-3" style="height:360px; color:#fff; font-size:4rem;"></div>
            <div class="d-flex flex-wrap align-items-center justify-content-between gap-2">
              <div>
                <h4 class="fw-bold mb-1" id="assetTitle">—</h4>
                <div class="d-flex flex-wrap gap-2 align-items-center" id="assetMetaChips"></div>
              </div>
              <div class="d-flex gap-2">
                <button class="btn btn-outline-secondary" onclick="damToast('Downloading asset...','info')"><i class="bi bi-download me-1"></i>Download</button>
                <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#shareModal"><i class="bi bi-share me-1"></i>Share</button>
              </div>
            </div>
          </div>

          <div class="card-surface p-4 mb-4">
            <h6 class="fw-bold mb-2">Description</h6>
            <p class="text-muted-2 mb-0" id="assetDescription">—</p>
          </div>

          <div class="card-surface p-4">
            <h6 class="fw-bold mb-3">Comments</h6>
            <div id="commentsList" class="mb-3"></div>
            <div class="d-flex gap-2">
              <img src="https://i.pravatar.cc/150?img=47" class="avatar-sm" alt="Your avatar">
              <div class="flex-fill">
                <textarea class="form-control mb-2" rows="2" id="newComment" placeholder="Add a comment for your team..."></textarea>
                <button class="btn btn-primary btn-sm" id="postCommentBtn"><i class="bi bi-send me-1"></i>Post Comment</button>
              </div>
            </div>
          </div>
        </div>

        <div class="col-lg-4">
          <div class="card-surface p-4 mb-4">
            <h6 class="fw-bold mb-3">Asset Information</h6>
            <div id="assetInfoList" class="small"></div>
          </div>

          <div class="card-surface p-4 mb-4">
            <h6 class="fw-bold mb-3">Version History</h6>
            <div id="versionHistory"></div>
          </div>

          <div class="card-surface p-4 mb-4">
            <h6 class="fw-bold mb-3">Activity Timeline</h6>
            <div class="timeline" id="assetTimeline"></div>
          </div>

          <div class="card-surface p-4">
            <h6 class="fw-bold mb-3">Related Assets</h6>
            <div id="relatedAssets"></div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Share modal -->
<div class="modal fade" id="shareModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content" style="border-radius:var(--radius-lg); border:none;">
      <div class="modal-header border-0">
        <h5 class="modal-title fw-bold">Share Asset</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <label class="form-label">Shareable link</label>
        <div class="input-group mb-3">
          <input type="text" class="form-control" id="shareLinkInput" readonly value="https://cloudvault-dam.azurewebsites.net/share/8f3ka2">
          <button class="btn btn-primary" id="copyLinkBtn"><i class="bi bi-clipboard"></i></button>
        </div>
      </div>
      <div class="modal-footer border-0">
        <button class="btn btn-outline-secondary" data-bs-dismiss="modal">Close</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/data.js"></script>
<script src="../js/layout.js"></script>
<script src="../js/main.js"></script>
<script src="../js/asset-details.js"></script>
</body>
</html>
