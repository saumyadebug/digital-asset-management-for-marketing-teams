<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page Not Found · CloudVault DAM</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@500;600;700;800&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
<link rel="stylesheet" href="../css/style.css">
</head>
<body>
<div class="error-page">
  <div>
    <svg width="220" height="160" viewBox="0 0 220 160" fill="none" class="mb-4">
      <rect x="30" y="30" width="160" height="100" rx="14" fill="var(--primary)" fill-opacity=".08"/>
      <rect x="55" y="50" width="110" height="14" rx="7" fill="var(--primary)" fill-opacity=".25"/>
      <rect x="55" y="74" width="80" height="10" rx="5" fill="var(--primary)" fill-opacity=".18"/>
      <circle cx="110" cy="112" r="16" fill="var(--accent)" fill-opacity=".3"/>
      <path d="M102 112h16M110 104v16" stroke="var(--primary)" stroke-width="3" stroke-linecap="round" transform="rotate(45 110 112)"/>
    </svg>
    <div class="error-code">404</div>
    <h4 class="fw-bold mt-2 mb-2">This page has wandered off</h4>
    <p class="text-muted-2 mb-4" style="max-width:420px; margin:0 auto;">
      The asset or page you're looking for doesn't exist, was moved, or you may have mistyped the address.
    </p>
    <div class="d-flex gap-2 justify-content-center flex-wrap">
      <a href="dashboard.html" class="btn btn-primary"><i class="bi bi-house-door me-1"></i>Return Home</a>
      <a href="gallery.html" class="btn btn-outline-secondary"><i class="bi bi-images me-1"></i>Browse Assets</a>
    </div>
  </div>
</div>
</body>
</html>
