<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Server Error · CloudVault DAM</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@500;600;700;800&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
<link rel="stylesheet" href="../css/style.css">
</head>
<body>
<div class="error-page">
  <div>
    <svg width="220" height="160" viewBox="0 0 220 160" fill="none" class="mb-4">
      <circle cx="110" cy="80" r="70" fill="var(--danger)" fill-opacity=".08"/>
      <rect x="70" y="50" width="80" height="60" rx="10" fill="var(--danger)" fill-opacity=".15"/>
      <path d="M110 68v22" stroke="var(--danger)" stroke-width="4" stroke-linecap="round"/>
      <circle cx="110" cy="98" r="2.5" fill="var(--danger)"/>
    </svg>
    <div class="error-code" style="background:linear-gradient(135deg, var(--danger), #F97316); -webkit-background-clip:text; background-clip:text;">500</div>
    <h4 class="fw-bold mt-2 mb-2">Something went wrong on our end</h4>
    <p class="text-muted-2 mb-4" style="max-width:420px; margin:0 auto;">
      Our servers hit an unexpected error while processing your request. Our engineering team on Azure has been notified.
    </p>
    <div class="d-flex gap-2 justify-content-center flex-wrap">
      <a href="dashboard.html" class="btn btn-primary"><i class="bi bi-house-door me-1"></i>Return Home</a>
      <button class="btn btn-outline-secondary" onclick="location.reload()"><i class="bi bi-arrow-clockwise me-1"></i>Try Again</button>
    </div>
  </div>
</div>
</body>
</html>
