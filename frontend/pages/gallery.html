<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Asset Gallery · CloudVault DAM</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@500;600;700;800&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
<link rel="stylesheet" href="../css/style.css">
</head>
<body>

<div id="pageLoader" class="position-fixed top-0 start-0 w-100 h-100 d-flex align-items-center justify-content-center" style="background:var(--bg); z-index:2000;">
  <div class="brand-spinner"></div>
</div>

<div class="app-shell">
  <div id="sidebar-mount"></div>

  <div class="main-content">
    <div id="topnav-mount"></div>

    <div class="page-body">
      <nav class="breadcrumb-surface" aria-label="breadcrumb">
        <a href="dashboard.html">Home</a> <i class="bi bi-chevron-right mx-1" style="font-size:.65rem;"></i> <span class="text-primary fw-semibold">Assets</span>
      </nav>

      <div class="d-flex flex-wrap align-items-center justify-content-between mb-4 gap-3">
        <div>
          <h2 class="fw-bold mb-1">Asset Gallery</h2>
          <p class="text-muted-2 mb-0"><span id="resultCount">16</span> assets in your workspace</p>
        </div>
        <a href="upload.html" class="btn btn-primary d-flex align-items-center gap-2"><i class="bi bi-cloud-arrow-up-fill"></i>Upload Asset</a>
      </div>

      <div class="row g-4">
        <!-- Filter panel -->
        <div class="col-lg-3">
          <div class="filter-panel">
            <h6 class="fw-bold mb-3"><i class="bi bi-funnel-fill me-2"></i>Filters</h6>

            <div class="mb-3">
              <label class="form-label">Search</label>
              <div class="position-relative">
                <i class="bi bi-search position-absolute" style="left:12px; top:11px; color:var(--text-muted); font-size:.85rem;"></i>
                <input type="search" class="form-control ps-5" id="searchInput" placeholder="Search assets...">
              </div>
            </div>

            <div class="mb-3">
              <label class="form-label">Category</label>
              <select class="form-select" id="filterCategory">
                <option value="">All Categories</option>
              </select>
            </div>

            <div class="mb-3">
              <label class="form-label">File Type</label>
              <select class="form-select" id="filterType">
                <option value="">All Types</option>
                <option value="image">Images</option>
                <option value="video">Videos</option>
                <option value="document">Documents</option>
                <option value="audio">Audio</option>
              </select>
            </div>

            <div class="mb-3">
              <label class="form-label">Upload Date</label>
              <select class="form-select" id="filterDate">
                <option value="">Any Time</option>
                <option value="7">Last 7 days</option>
                <option value="30">Last 30 days</option>
                <option value="90">Last 90 days</option>
              </select>
            </div>

            <div class="mb-3">
              <label class="form-label">Sort By</label>
              <select class="form-select" id="sortBy">
                <option value="newest">Newest First</option>
                <option value="oldest">Oldest First</option>
                <option value="name">Name (A–Z)</option>
                <option value="downloads">Most Downloaded</option>
              </select>
            </div>

            <button class="btn btn-outline-secondary w-100" id="clearFiltersBtn"><i class="bi bi-arrow-counterclockwise me-1"></i>Clear Filters</button>
          </div>
        </div>

        <!-- Results -->
        <div class="col-lg-9">
          <div class="d-flex align-items-center justify-content-between mb-3">
            <div class="d-flex gap-2 flex-wrap" id="activeChips"></div>
            <div class="btn-group flex-shrink-0" role="group" aria-label="View toggle">
              <button class="btn btn-outline-secondary btn-sm active" id="gridViewBtn" aria-label="Grid view"><i class="bi bi-grid-3x3-gap-fill"></i></button>
              <button class="btn btn-outline-secondary btn-sm" id="listViewBtn" aria-label="List view"><i class="bi bi-list-ul"></i></button>
            </div>
          </div>

          <div id="assetGrid" class="row g-3 stagger"></div>
          <div id="assetList" class="table-surface d-none"></div>
          <div id="emptyState" class="text-center py-5 d-none">
            <i class="bi bi-inbox display-4 text-muted-2"></i>
            <h6 class="fw-bold mt-3">No assets found</h6>
            <p class="text-muted-2">Try adjusting or clearing your filters.</p>
          </div>

          <nav class="d-flex justify-content-center mt-4" aria-label="Gallery pagination">
            <ul class="pagination" id="pagination"></ul>
          </nav>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Share modal -->
<div class="modal fade" id="shareModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content" style="border-radius:var(--radius-lg); border:none;">
      <div class="modal-header border-0">
        <h5 class="modal-title fw-bold">Share Asset</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <label class="form-label">Shareable link</label>
        <div class="input-group mb-3">
          <input type="text" class="form-control" id="shareLinkInput" readonly value="https://cloudvault-dam.azurewebsites.net/share/8f3ka2">
          <button class="btn btn-primary" id="copyLinkBtn"><i class="bi bi-clipboard"></i></button>
        </div>
        <label class="form-label">Invite by email</label>
        <input type="email" class="form-control" placeholder="teammate@brightwave-marketing.com">
      </div>
      <div class="modal-footer border-0">
        <button class="btn btn-outline-secondary" data-bs-dismiss="modal">Close</button>
        <button class="btn btn-primary">Send Invite</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/data.js"></script>
<script src="../js/layout.js"></script>
<script src="../js/main.js"></script>
<script src="../js/gallery.js"></script>
</body>
</html>
