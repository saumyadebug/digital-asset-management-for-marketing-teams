<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Upload Asset · CloudVault DAM</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@500;600;700;800&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
<link rel="stylesheet" href="../css/style.css">
</head>
<body>

<div id="pageLoader" class="position-fixed top-0 start-0 w-100 h-100 d-flex align-items-center justify-content-center" style="background:var(--bg); z-index:2000;">
  <div class="brand-spinner"></div>
</div>

<div class="app-shell">
  <div id="sidebar-mount"></div>

  <div class="main-content">
    <div id="topnav-mount"></div>

    <div class="page-body">
      <nav class="breadcrumb-surface" aria-label="breadcrumb">
        <a href="dashboard.html">Home</a> <i class="bi bi-chevron-right mx-1" style="font-size:.65rem;"></i> <span class="text-primary fw-semibold">Upload Asset</span>
      </nav>

      <div class="mb-4">
        <h2 class="fw-bold mb-1">Upload a new asset</h2>
        <p class="text-muted-2 mb-0">Add creative files to your shared marketing library.</p>
      </div>

      <div class="row g-4">
        <div class="col-lg-7">
          <div class="card-surface p-4 mb-4">
            <div class="dropzone" id="dropzone" tabindex="0" role="button" aria-label="Drag and drop files here, or browse">
              <div class="dz-icon"><i class="bi bi-cloud-arrow-up"></i></div>
              <h6 class="fw-bold mb-1">Drag &amp; drop files here</h6>
              <p class="text-muted-2 small mb-3">Supports images, videos, PDFs and documents up to 500 MB each</p>
              <button type="button" class="btn btn-primary btn-sm" id="browseBtn"><i class="bi bi-folder2-open me-1"></i>Browse Files</button>
              <input type="file" id="fileInput" class="d-none" multiple accept=".jpg,.jpeg,.png,.svg,.gif,.mp4,.mov,.pdf,.doc,.docx,.xls,.xlsx,.ppt,.pptx,.zip,.mp3">
              <div class="d-flex justify-content-center gap-3 mt-3 flex-wrap">
                <span class="chip chip-neutral"><i class="bi bi-image"></i>Images</span>
                <span class="chip chip-neutral"><i class="bi bi-camera-reels"></i>Videos</span>
                <span class="chip chip-neutral"><i class="bi bi-file-earmark-pdf"></i>PDF</span>
                <span class="chip chip-neutral"><i class="bi bi-file-earmark-text"></i>Documents</span>
              </div>
            </div>

            <div id="fileQueue" class="mt-4"></div>
          </div>
        </div>

        <div class="col-lg-5">
          <div class="card-surface p-4">
            <h6 class="fw-bold mb-3">Asset details</h6>
            <form id="uploadForm">
              <div class="mb-3">
                <label for="assetName" class="form-label">Asset name</label>
                <input type="text" class="form-control" id="assetName" placeholder="e.g. Diwali Sale Instagram Post" required>
              </div>

              <div class="mb-3">
                <label for="assetCategory" class="form-label">Category</label>
                <select class="form-select" id="assetCategory" required>

    <option value="">Select Category</option>

    <option value="1">Marketing</option>

    <option value="2">Design</option>

    <option value="3">Documents</option>

    <option value="4">Images</option>

    <option value="5">Videos</option>

    <option value="6">HR</option>

    <option value="7">Finance</option>

</select>
              </div>

              <div class="mb-3">
                <label for="assetDescription" class="form-label">Description</label>
                <textarea class="form-control" id="assetDescription" rows="3" placeholder="Briefly describe this asset and how it should be used..."></textarea>
              </div>

              <div class="mb-3">
                <label for="assetTags" class="form-label">Tags</label>
                <input type="text" class="form-control" id="assetTags" placeholder="e.g. summer, banner, social (comma separated)">
              </div>

              <div class="row">
                <div class="col-6 mb-3">
                  <label class="form-label">Visibility</label>
                  <select class="form-select" id="assetVisibility">
                    <option>Public</option>
                    <option>Private</option>
                  </select>
                </div>
                <div class="col-6 mb-3">
                  <label for="assetDepartment" class="form-label">Department</label>
                  <select class="form-select" id="assetDepartment">
                    <option>Brand &amp; Content</option>
                    <option>Performance Marketing</option>
                    <option>Product Marketing</option>
                    <option>Social &amp; Community</option>
                  </select>
                </div>
              </div>

              <div id="uploadProgressWrap" class="mb-3 d-none">
                <div class="d-flex justify-content-between small mb-1">
                  <span class="text-muted-2">Uploading...</span>
                  <span id="uploadPercent" class="fw-semibold">0%</span>
                </div>
                <div class="progress"><div class="progress-bar progress-bar-striped progress-bar-animated" id="uploadProgressBar" style="width:0%"></div></div>
              </div>

              <div class="d-flex gap-2">
                <button type="button" class="btn btn-outline-secondary flex-fill" id="cancelUploadBtn">Cancel</button>
                <button type="submit" class="btn btn-primary flex-fill" id="submitUploadBtn">
                  <i class="bi bi-cloud-arrow-up-fill me-1"></i>Submit
                </button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/data.js"></script>
<script src="../js/layout.js"></script>
<script src="../js/main.js"></script>
<script src="../js/upload.js"></script>
</body>
</html>
